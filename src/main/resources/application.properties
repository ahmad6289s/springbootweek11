spring.application.name=mathtutortable


spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:tutordb}
spring.datasource.username=${DB_USER:tutoruser}
spring.datasource.password=${DB_PASSWORD:tutorpass}