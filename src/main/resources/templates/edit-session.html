<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Session</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-light">




<nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand">Edit Session</span>

    <div class="ms-auto">
        <a class="btn btn-light" th:href="@{/sessions}">
            Back
        </a>
    </div>
</nav>




<div class="container-fluid mt-4 px-5">

    <h2 class="mb-4 text-primary">Edit Tutor Session</h2>

    <form th:action="@{/sessions/update}" th:object="${sessions}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Student Name</label>
            <input type="text" class="form-control" th:field="*{studentName}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Course</label>
            <input type="text" class="form-control" th:field="*{course}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Topic</label>
            <input type="text" class="form-control" th:field="*{topic}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Visit Date</label>
            <input type="date" class="form-control" th:field="*{visitDate}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" th:field="*{status}">
                <option value="Waiting">Waiting</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
            </select>
        </div>




        <div class="mt-4">
            <button type="submit" class="btn btn-primary btn-lg me-3 px-5">
                <i class="fa-solid fa-pen-to-square me-1"></i> Update
            </button>

            <a class="btn btn-secondary btn-lg px-5" th:href="@{/sessions}">
                Back
            </a>
        </div>

    </form>

</div>

</body>
</html>
