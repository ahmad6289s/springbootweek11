<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Math Tutor Table Manager</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-light">




<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-3">
    <span class="navbar-brand">MathTutorTable</span>

    <div class="ms-auto">
        <a class="btn btn-light" th:href="@{/sessions}">
            <i class="fa-solid fa-list me-1"></i> View Sessions
        </a>
    </div>
</nav>



<div class="container-fluid text-center mt-5 px-5">

    <h1 class="mb-4">Welcome to MathTutorTable Manager</h1>

    <p class="lead">
        This application helps track students visits at the math tutoring table.
    </p>

    <p class="mb-4">
        You can add, update, view, and delete tutoring sessions records for math tutoring table .
    </p>

    <a class="btn btn-primary btn-lg px-5" th:href="@{/sessions}">
        Go to Sessions
    </a>

</div>

</body>
</html>
