version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tutor-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tutordb
      MYSQL_USER: mathusername
      MYSQL_PASSWORD: mathuserpassword
    ports:
      - "3307:3306"
    volumes:
      - tutor_data:/var/lib/mysql

  app:
    build: .
    container_name: tutor-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_NAME: tutordb
      DB_USER: mathusername
      DB_PASSWORD: mathuserpassword

volumes:
  tutor_data: